name: Daily Newsletter Digest

on:
  schedule:
    - cron: "30 1 * * *"   # 01:30 UTC = 07:00 AM IST every day
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run newsletter digest
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SOURCE_SENDER_EMAILS: ${{ secrets.SOURCE_SENDER_EMAILS }}
          SUMMARY_TO_EMAIL: ${{ secrets.SUMMARY_TO_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PORTAL_API_URL: ${{ secrets.PORTAL_API_URL }}
          PORTAL_API_SECRET: ${{ secrets.PORTAL_API_SECRET }}
          TIMEZONE: "Asia/Kolkata"
          STATE_FILE: "processed_state.json"
        run: python main.py --run-once
